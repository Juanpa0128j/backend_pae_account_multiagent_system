name: CI

on:
  pull_request:
    branches:
      - "**"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run migrations on CI database
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_test"
          GEMINI_API_KEY: "dummy-for-unit-tests"

      - name: Run unit tests
        run: |
          uv run pytest tests/ -v --timeout=60 \
            --ignore=tests/e2e \
            --ignore=tests/features/test_supabase_pipeline_feature.py \
            -p no:warnings
        env:
          GEMINI_API_KEY: "dummy-for-unit-tests"
          OPENAI_API_KEY: "dummy-for-unit-tests"
          GROQ_API_KEY: ""
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_test"
          LLAMA_CLOUD_API_KEY: "dummy-for-unit-tests"
          HF_TOKEN: ""

  simulate-pipeline:
    name: Simulate Pipeline (Via A + Via B)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Start backend server
        run: |
          uv run uvicorn main:app --host 0.0.0.0 --port 8016 &
          echo $! > /tmp/uvicorn.pid
          echo "Backend PID: $(cat /tmp/uvicorn.pid)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_CLOUD_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8016/docs > /dev/null 2>&1; then
              echo "Backend is ready after ${i}s"
              break
            fi
            echo "Waiting... (${i}/20)"
            sleep 2
          done
          curl -sf http://127.0.0.1:8016/docs > /dev/null || (echo "Backend failed to start" && exit 1)

      - name: Run Via A simulation (demo documents)
        run: |
          uv run python scripts/simulate_frontend_full_pipeline.py \
            --base-url http://127.0.0.1:8016 \
            --source-mode demo \
            --company-nit "CI${{ github.run_id }}A" \
            --city Bogota \
            --ciiu 6920 \
            --timeout-seconds 300 \
            --poll-seconds 3 \
            --report-timeout-seconds 420
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_CLOUD_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run Via B simulation (first-level uploads)
        run: |
          uv run python scripts/simulate_frontend_full_pipeline.py \
            --base-url http://127.0.0.1:8016 \
            --source-mode via-b \
            --company-nit "CI${{ github.run_id }}B" \
            --city Medellin \
            --ciiu 6910 \
            --timeout-seconds 180 \
            --poll-seconds 3 \
            --report-timeout-seconds 420
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_CLOUD_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Stop backend server
        if: always()
        run: pkill -f "uvicorn main:app" || true
