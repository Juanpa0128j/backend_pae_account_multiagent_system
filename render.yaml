services:
  - type: web
    name: pae-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio"
    preDeployCommand: "uv run alembic upgrade head"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: APP_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
