services:
  - type: web
    name: pae-backend
    env: python
    plan: free
    buildCommand: "pip install uv && uv pip install --system fastapi uvicorn pypdf python-multipart"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        sync: false # Set to false to hide the domain in code, meaning you MUST set this value manually in the Render Dashboard after deploying.
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
